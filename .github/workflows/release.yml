name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "version_name=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create release package
        run: |
          # 创建临时目录
          mkdir -p release_temp

          # 只复制 SKILL 必须的文件
          # 1. 技能主文件
          cp SKILL.md release_temp/

          # 2. 内置工具（Java + Python）
          cp -r scripts release_temp/

          # 3. 模板资源
          cp -r assets release_temp/

          # 4. 项目分析指南（SKILL.md 中引用的必须文件）
          cp -r references release_temp/

          # 创建 zip 包
          cd release_temp
          zip -r ../zentao-workflow-${{ steps.version.outputs.version }}.zip .
          cd ..

          # 清理临时目录
          rm -rf release_temp

          # 显示包内容
          echo "📦 Release package contents:"
          unzip -l zentao-workflow-${{ steps.version.outputs.version }}.zip

          # 显示包大小
          echo ""
          echo "📦 Package size:"
          ls -lh zentao-workflow-${{ steps.version.outputs.version }}.zip

      - name: Generate release notes
        id: notes
        run: |
          # 从 CHANGELOG.md 提取当前版本的变更记录
          VERSION=${{ steps.version.outputs.version_name }}
          NOTES=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d')
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Zentao Workflow Skill ${{ steps.version.outputs.version }}
          body: |
            ## 禅道开发工作流助手 ${{ steps.version.outputs.version }}

            ${{ steps.notes.outputs.notes }}

            ---

            ## 快速安装

            **方法一：直接下载（推荐）**

            1. 下载下方的 `zentao-workflow-${{ steps.version.outputs.version }}.zip`
            2. 解压到 Claude Code 技能目录：

            ```bash
            # Linux/macOS
            mkdir -p ~/.claude/skills/zentao-workflow
            unzip zentao-workflow-${{ steps.version.outputs.version }}.zip -d ~/.claude/skills/zentao-workflow

            # Windows PowerShell
            New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.claude\skills\zentao-workflow"
            Expand-Archive zentao-workflow-${{ steps.version.outputs.version }}.zip -DestinationPath "$env:USERPROFILE\.claude\skills\zentao-workflow"
            ```

            3. 重启 Claude Code 即可使用

            **方法二：查看完整文档**

            访问 [GitHub 仓库](https://github.com/zulinliu/zentao-workflow) 查看完整使用文档。

            ## 环境要求

            只需满足以下**任一**环境：
            - Java 8+
            - Python 3.6+

            ## 包内容

            | 文件/目录 | 说明 |
            |-----------|------|
            | `SKILL.md` | 技能主文件 |
            | `scripts/` | 内置工具（Java jar + Python） |
            | `assets/` | 模板资源（配置模板、技术方案模板） |
            | `references/` | 项目分析指南（Java/React） |

          files: |
            zentao-workflow-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
