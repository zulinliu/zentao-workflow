name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "version_name=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create release package
        run: |
          # 创建带目录结构的临时目录
          mkdir -p release_temp/worklet

          # 只复制 SKILL 必须的文件到 worklet 子目录
          cp SKILL.md release_temp/worklet/
          cp -r assets release_temp/worklet/
          cp -r references release_temp/worklet/

          # 复制 scripts 目录
          mkdir -p release_temp/worklet/scripts
          cp scripts/worklet.py release_temp/worklet/scripts/ 2>/dev/null || true
          cp scripts/requirements.txt release_temp/worklet/scripts/ 2>/dev/null || true
          cp -r scripts/worklet release_temp/worklet/scripts/ 2>/dev/null || true

          # 创建 zip 包（包含 worklet 目录）
          cd release_temp
          zip -r ../worklet-${{ steps.version.outputs.version }}.zip worklet
          cd ..

          # 清理临时目录
          rm -rf release_temp

          # 显示包内容
          echo "📦 Release package contents:"
          unzip -l worklet-${{ steps.version.outputs.version }}.zip

          # 显示包大小
          echo ""
          echo "📦 Package size:"
          ls -lh worklet-${{ steps.version.outputs.version }}.zip

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.version_name }}
          NOTES=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d')
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Worklet ${{ steps.version.outputs.version }}
          body: |
            ## Worklet ${{ steps.version.outputs.version }}

            ${{ steps.notes.outputs.notes }}

            ---

            ## 快速安装

            **下载解压即可使用**

            1. 下载下方的 `worklet-${{ steps.version.outputs.version }}.zip`
            2. 解压到 Claude Code 技能目录：

            ```bash
            # Linux/macOS
            mkdir -p ~/.claude/skills
            unzip worklet-${{ steps.version.outputs.version }}.zip -d ~/.claude/skills/

            # Windows PowerShell
            New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.claude\skills"
            Expand-Archive worklet-${{ steps.version.outputs.version }}.zip -DestinationPath "$env:USERPROFILE\.claude\skills"
            ```

            3. 重启 Claude Code 即可使用

            > 💡 zip 包内已包含 `worklet/` 目录，解压后直接可用

            ## 环境要求

            只需满足以下环境：
            - Python 3.10+

            ## 包内容

            ```
            worklet/
            ├── SKILL.md              # 技能主文件
            ├── scripts/              # 内置工具（Python）
            ├── assets/               # 模板资源
            └── references/           # 项目分析指南
            ```

          files: |
            worklet-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
