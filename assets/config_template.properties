# 禅道配置文件模板
# 保存位置: ~/.chandao/config.properties

# ==================== 必填配置 ====================

# 禅道服务器地址
# 示例: https://zentao.example.com
zentao.url=

# 登录用户名
zentao.username=

# 登录密码
zentao.password=

# ==================== 可选配置 ====================

# 输出目录（默认使用当前工作目录）
# 示例: ~/chandao 或 /path/to/workspace
output.dir=

# 连接超时时间（毫秒，默认 30000）
connect.timeout=30000

# 读取超时时间（毫秒，默认 60000）
read.timeout=60000

# 下载线程数（默认 3）
download.threads=3
